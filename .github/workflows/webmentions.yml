name: Refresh Webmentions

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch and cache webmentions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Fetch webmentions
        run: pnpm webmentions
        env:
          WEBMENTION_URL: ${{ secrets.WEBMENTION_URL }}

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/webmentions/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh webmentions cache"
            git push
          fi