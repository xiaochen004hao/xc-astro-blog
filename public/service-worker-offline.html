<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>xcblog · 离线模式</title>
	<meta name="description" content="您当前处于离线状态" />
	<style>
		:root {
			--text: oklch(26.99% 0.0096 235.05);
			--bg: #fff;
			--accent: oklch(47% 0.08 194.77);
			--muted: oklch(60% 0.01 235);
		}
		@media (prefers-color-scheme: dark) {
			:root {
				--text: oklch(83.54% 0 264);
				--bg: #1a1a1a;
				--accent: oklch(85.06% 0.141 194.84);
				--muted: oklch(60% 0.01 264);
			}
		}
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "LXGW WenKai LITE", sans-serif;
			background: var(--bg);
			color: var(--text);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background 0.3s, color 0.3s;
		}
		.container { text-align: center; padding: 2rem; }
		.icon { display: block; margin: 0 auto; width: 80px; height: 80px; opacity: 0.2; color: var(--text); }
		.label { margin-top: 1.5rem; font-size: 1.25rem; font-weight: 500; opacity: 0.7; color: var(--text); }
		.desc { margin-top: 0.75rem; max-width: 20rem; line-height: 1.6; font-size: 0.95rem; opacity: 0.5; color: var(--text); }
	</style>
</head>
<body>
	<div class="container">
		<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
			<path stroke-linecap="round" stroke-linejoin="round" d="M18.36 6.64a9 9 0 1 1-12.73 0" />
			<line x1="12" y1="2" x2="12" y2="6" stroke-linecap="round" stroke-linejoin="round" />
		</svg>
		<p class="label">您当前处于离线状态</p>
		<p class="desc">部分已缓存的页面仍可浏览。<br />恢复网络后将自动更新。</p>
	</div>
</body>
</html>
